<h2>Productos</h2>

<div class="filtros">
  <button (click)="mostrarTodos()" [class.activo]="categoriaActiva === ''">Todos</button>
  <button (click)="filtrar('mujer')" [class.activo]="categoriaActiva === 'mujer'">Mujer</button>
  <button (click)="filtrar('hombre')" [class.activo]="categoriaActiva === 'hombre'">Hombre</button>
</div>

@if (mensajeConfirmacion) {
  <div class="toast">{{ mensajeConfirmacion }}</div>
}

<div class="grid">
  @for (producto of productos; track producto.id) {
    <app-producto-card
      [producto]="producto"
      (agregado)="onAgregado($event)">
    </app-producto-card>
  }
</div>
