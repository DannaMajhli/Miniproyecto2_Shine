<h2 class="mb-4">Productos</h2>

@if (ultimoAgregado()) {
  <div class="alert alert-success">
    ✅ {{ ultimoAgregado() }} agregado al carrito
  </div>
}

<div class="mb-3">
  <input
    type="text"
    class="form-control"
    placeholder="Buscar producto..."
    [(ngModel)]="busqueda">
</div>

@if (productosFiltrados.length === 0) {
  <p class="text-muted text-center mt-4">No se encontraron productos.</p>
}

<div class="row">
  @for (producto of productosFiltrados; track producto.id) {
    <div class="col-md-4 mb-4">
      <app-producto-card
        [producto]="producto"
        (agregado)="onAgregado($event)">
      </app-producto-card>
    </div>
  }
</div>
