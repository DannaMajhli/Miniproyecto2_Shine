@if (producto) {
  <div class="row mt-4">
    <div class="col-md-5">
      <img [src]="'http://localhost:3000/' + producto.img" [alt]="producto.nombre" class="img-fluid rounded">
    </div>
    <div class="col-md-7">
      <h2>{{ producto.nombre }}</h2>
      <p class="text-muted">{{ producto.categoria }}</p>
      <p>{{ producto.descripcion }}</p>
      <h4 class="fw-bold">{{ producto.precio | currency:'MXN' }}</h4>
      <p>Stock disponible: {{ producto.stock }}</p>

      <button class="btn btn-dark me-2" (click)="agregar()">
        Agregar al carrito
      </button>
      <a routerLink="/productos" class="btn btn-outline-secondary">
        Regresar
      </a>
    </div>
  </div>
} @else {
  <p class="text-center mt-5">Cargando producto...</p>
}
